<script type="text/javascript">
    RED.nodes.registerType('rpc-server', {
        category: 'config',
        defaults: {
            name: { value: "" },
            endpoint: { value: "/rpc", required: true },
            safeEnabled: { value: true },
            corsEnabled: { value: false },
            authMode: { value: "none" }
        },
        credentials: {
            authToken: { type: "password" }
        },
        label: function() {
            return this.name || "RPC Server (" + this.endpoint + ")";
        },
        oneditprepare: function() {
            const node = this;

            if (!$('#node-config-input-authMode').val()) {
                $('#node-config-input-authMode').val(node.authEnabled ? 'bearer' : 'none');
            }

            function updateAuthTokenRow() {
                $('.node-config-input-auth-token-row').toggle($('#node-config-input-authMode').val() === 'bearer');
            }

            function escapeHtml(value) {
                return String(value)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            $('#node-config-input-authMode').on('change', updateAuthTokenRow);
            updateAuthTokenRow();

            // Show server info
            $.getJSON('rpc-server-info/' + node.id, function(data) {
                if (data && data.active) {
                    const methods = Array.isArray(data.methods) ? data.methods : [];
                    const methodsText = methods.length > 0 ? methods.map(escapeHtml).join(', ') : '<span class="rpc-toolkit-muted">(none)</span>';
                    const info = '<div class="rpc-toolkit-status-card">' +
                        '<div class="rpc-toolkit-status-title">Server Status</div>' +
                        '<table class="rpc-toolkit-status-table">' +
                            '<tbody>' +
                                '<tr><th>Status</th><td><span class="rpc-toolkit-status-active">● Active</span></td></tr>' +
                                '<tr><th>Endpoint</th><td><span class="rpc-toolkit-endpoint">' + escapeHtml(data.endpoint) + '</span></td></tr>' +
                                '<tr><th>Safe Mode</th><td>' + (data.safeEnabled ? 'enabled' : 'disabled') + '</td></tr>' +
                                '<tr><th>CORS</th><td>' + (data.corsEnabled ? 'enabled' : 'disabled') + '</td></tr>' +
                                '<tr><th>Authentication</th><td>' + (data.authEnabled ? 'bearer token' : 'disabled') + '</td></tr>' +
                                '<tr><th>Methods</th><td>' + escapeHtml(data.methodCount || 0) + '</td></tr>' +
                                '<tr><th>Registered</th><td class="rpc-toolkit-methods">' + methodsText + '</td></tr>' +
                            '</tbody>' +
                        '</table>' +
                        '</div>';
                    $('#node-config-server-info').html(info);
                }
            });
        }
	    });
	</script>

	<script type="text/html" data-template-name="rpc-server">
    <div class="rpc-toolkit-editor rpc-toolkit-server-editor">
	    <div class="form-row">
	        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" class="rpc-toolkit-control" placeholder="RPC Server">
	    </div>
	    
	    <div class="form-row">
	        <label for="node-config-input-endpoint"><i class="fa fa-sitemap"></i> Endpoint</label>
        <input type="text" id="node-config-input-endpoint" class="rpc-toolkit-control" placeholder="/rpc">
	        <div class="form-tips">HTTP endpoint path (e.g., /rpc, /api/rpc)</div>
	    </div>
	    
    <div class="form-row rpc-toolkit-check-row">
        <label for="node-config-input-safeEnabled"><i class="fa fa-shield"></i> Safe Mode</label>
        <input type="checkbox" id="node-config-input-safeEnabled" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-config-input-safeEnabled" class="rpc-toolkit-check-label">Enabled</label>
        <div class="form-tips">Enabled by default for RPC Toolkit interoperability. Disable it for standard JSON-RPC 2.0 clients.</div>
    </div>

    <div class="form-row">
        <label for="node-config-input-authMode"><i class="fa fa-lock"></i> Authentication</label>
        <select id="node-config-input-authMode" class="rpc-toolkit-control">
            <option value="none">None</option>
            <option value="bearer">Bearer token</option>
        </select>
        <div class="form-tips">Optional HTTP authentication checked before the JSON-RPC endpoint handles the request.</div>
    </div>

    <div class="form-row node-config-input-auth-token-row">
        <label for="node-config-input-authToken"><i class="fa fa-key"></i> Auth Token</label>
        <input type="password" id="node-config-input-authToken" class="rpc-toolkit-control" placeholder="Bearer token">
        <div class="form-tips">Stored in Node-RED credentials. Enter either the token value or the full Bearer header value.</div>
    </div>

    <div class="form-row rpc-toolkit-check-row">
        <label for="node-config-input-corsEnabled"><i class="fa fa-globe"></i> CORS</label>
        <input type="checkbox" id="node-config-input-corsEnabled" style="display:inline-block; width:auto; vertical-align:top;">
        <label for="node-config-input-corsEnabled" class="rpc-toolkit-check-label">Enabled</label>
        <div class="form-tips">Allow cross-origin requests</div>
    </div>
	    
	    <div class="form-row">
	        <div id="node-config-server-info"></div>
	    </div>
    </div>
	</script>

<script type="text/html" data-help-name="rpc-server">
    <p>Configuration node for a JSON-RPC 2.0 server.</p>
    
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Endpoint <span class="property-type">string</span></dt>
        <dd>The URL path for RPC requests, for example <code>/rpc</code> or <code>/rpc-standard</code>. The server is mounted on Node-RED's HTTP server at the configured path.</dd>
        
        <dt>Safe Mode <span class="property-type">boolean</span></dt>
        <dd>When enabled, the server uses RPC Toolkit Safe Mode serialization and requires the <code>X-RPC-Safe-Enabled</code> header. When disabled, the endpoint behaves as standard JSON-RPC 2.0 and does not add Safe Mode string/date prefixes.</dd>

        <dt>Authentication <span class="property-type">string</span></dt>
        <dd>Optional bearer token authentication. The token is stored in Node-RED credentials and requests without a matching <code>Authorization: Bearer ...</code> header are rejected with HTTP 401.</dd>

        <dt>CORS <span class="property-type">boolean</span></dt>
        <dd>Enable Cross-Origin Resource Sharing for browser access</dd>
    </dl>
    
    <h3>Details</h3>
    <p>This configuration node creates a global HTTP endpoint that handles JSON-RPC 2.0 requests. 
    It doesn't appear in the flow - instead, <code>rpc-method</code> nodes reference it to register their handlers.</p>
    
    <p>The server automatically starts when Node-RED starts and uses the built-in HTTP server.</p>
    
    <h3>References</h3>
    <ul>
        <li><a href="https://www.jsonrpc.org/specification">JSON-RPC 2.0 Specification</a></li>
        <li><a href="https://github.com/n-car/node-red-contrib-rpc-toolkit">GitHub Repository</a></li>
    </ul>
</script>
